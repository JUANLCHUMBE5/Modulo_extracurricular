[build]
  command = "npm run build"
  publish = "dist"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/db/reset"
  to = "/.netlify/functions/db"
  status = 200

[[redirects]]
  from = "/api/db"
  to = "/.netlify/functions/db"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
